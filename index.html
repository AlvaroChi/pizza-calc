<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<title>Pizza Tools</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    color: #222;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -.02em;
    margin-bottom: 6px;
  }
  header p {
    font-size: .95rem;
    color: #666;
  }
  .tools {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  .tool-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border-radius: 12px;
    padding: 20px 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,.1);
    text-decoration: none;
    color: inherit;
    transition: transform .15s, box-shadow .15s;
  }
  .tool-card:active {
    transform: scale(.98);
    box-shadow: 0 0 2px rgba(0,0,0,.08);
  }
  .tool-icon {
    font-size: 2.2rem;
    flex-shrink: 0;
  }
  .tool-info h2 {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .tool-info p {
    font-size: .82rem;
    color: #666;
  }
  footer {
    margin-top: auto;
    padding-top: 40px;
    font-size: .78rem;
    color: #aaa;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>🍕 Pizza Tools</h1>
  <p>Calcolatori per impasti</p>
</header>

<nav class="tools">
  <a class="tool-card" href="./calcolatore-napoletana.html">
    <span class="tool-icon">🔵</span>
    <div class="tool-info">
      <h2>Pizza Napoletana 65%</h2>
      <p>Panetti baby e standard · autolisi · lievito variabile</p>
    </div>
  </a>
  <a class="tool-card" href="./calcolatore-teglia.html">
    <span class="tool-icon">🟫</span>
    <div class="tool-info">
      <h2>Pizza in Teglia 72%</h2>
      <p>Per teglia · precottura rossa · autolisi · olio</p>
    </div>
  </a>
</nav>

<footer>
  Funziona offline dopo il primo caricamento
</footer>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>

</body>
</html>
